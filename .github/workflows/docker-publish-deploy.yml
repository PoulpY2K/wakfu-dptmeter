name: Docker Publish and Deploy

on:
  workflow_run:
    workflows: [ "Tauri build, upload and run analysis" ]
    types: [ completed ]
    branches-ignore: [ 'main' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-tauri:
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: read
    outputs:
      has-latest: ${{ steps.check-latest.outputs.has-latest }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - uses: actions/checkout@v7.0.1

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: cache rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: "src-tauri"
          cache-workspace-crates: "true"

      - name: build and release tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: wakfu-dptmeter-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "Wakfu DPTMeter v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          generateReleaseNotes: true
          prerelease: false
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}